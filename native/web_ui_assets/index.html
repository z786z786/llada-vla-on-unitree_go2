<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Go2 Collector</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="shell">
    <section class="panel summary-panel">
      <div class="title-row">
        <div>
          <h1>Go2 Collector</h1>
          <p class="subtle">most important state only</p>
        </div>
      </div>
      <div id="summary-grid" class="summary-grid status-strip"></div>
      <p id="summary-note" class="summary-note subtle"></p>
    </section>

    <section class="columns">
      <section class="panel">
        <h2>Collector Config</h2>
        <p class="subtle">配置在 collector 启动时固定；这里仅展示当前运行参数，修改请重启 collector。</p>
        <form id="config-form" class="compact-form">
          <div class="form-grid">
            <label><span>Scene</span><input id="cfg-scene-id" type="text" placeholder="ex: corridor_a" readonly disabled></label>
            <label><span>Operator</span><input id="cfg-operator-id" type="text" placeholder="ex: op_01" readonly disabled></label>
            <label class="wide"><span>Instruction</span><input id="cfg-instruction" type="text" placeholder="ex: go to the red door" readonly disabled></label>
            <label><span>Capture Mode</span>
              <select id="cfg-capture-mode" disabled>
                <option value="trajectory">trajectory</option>
              </select>
            </label>
            <label><span>Task Family</span><input id="cfg-task-family" type="text" placeholder="ex: goal_navigation" readonly disabled></label>
            <label><span>Target Type (optional)</span><input id="cfg-target-type" type="text" placeholder="ex: door" readonly disabled></label>
            <label class="wide"><span>Target Description (optional)</span><input id="cfg-target-description" type="text" placeholder="leave blank and derive left/right/near/far offline" readonly disabled></label>
            <label class="wide"><span>Collector Notes</span><input id="cfg-collector-notes" type="text" placeholder="ex: start from hallway corner" readonly disabled></label>
            <div class="wide triple-row">
              <label><span>cmd_vx_max</span><input id="cfg-cmd-vx-max" type="number" step="0.01" placeholder="ex: 0.20" readonly disabled></label>
              <label><span>cmd_vy_max</span><input id="cfg-cmd-vy-max" type="number" step="0.01" placeholder="ex: 0.20" readonly disabled></label>
              <label><span>cmd_wz_max</span><input id="cfg-cmd-wz-max" type="number" step="0.01" placeholder="ex: 0.80" readonly disabled></label>
            </div>
          </div>
        </form>
      </section>

      <section class="panel right-panel">
        <section class="stack-block controls-block">
          <div class="section-head">
            <h2>Controls</h2>
            <span id="controls-hint" class="subtle">keyboard + web buttons</span>
          </div>
          <div class="actions actions-keys controls-grid">
            <button id="start-btn"><span class="btn-label">Start</span><span class="kbd">R</span></button>
            <button id="stop-btn"><span class="btn-label">Stop</span><span class="kbd">T</span></button>
            <button id="discard-btn"><span class="btn-label">Discard</span><span class="kbd">ESC</span></button>
            <button id="estop-btn" class="danger"><span class="btn-label">E-Stop</span><span class="kbd">Space</span></button>
            <button id="clear-fault-btn"><span class="btn-label">Clear Fault</span><span class="kbd">C</span></button>
            <button id="quit-btn"><span class="btn-label">Quit</span><span class="kbd">X</span></button>
          </div>
        </section>

        <section class="stack-block camera-block">
          <div class="section-head">
            <h2>Camera</h2>
            <div class="camera-head-actions">
              <button id="camera-focus-btn" class="ghost-btn" type="button" aria-pressed="false">Focus View</button>
              <div id="camera-meta" class="camera-meta">waiting for image...</div>
            </div>
          </div>
          <img id="camera-thumb" class="camera-thumb" alt="collector thumbnail">
        </section>

        <section class="stack-block rating-block">
          <div class="section-head">
            <h2>Data Rating</h2>
            <span id="rating-hint" class="subtle">1-4 shortcuts</span>
          </div>
          <p class="subtle">用 1-4 直接给当前数据打分，自动映射到内部标签组合。</p>
          <div id="rating-grid" class="rating-grid">
            <button id="rating-1-btn" class="rating-card rating-good" type="button">
              <span class="rating-key">1</span>
              <span class="rating-title">好的成功示范</span>
              <span class="rating-desc">clean + success + goal_reached</span>
            </button>
            <button id="rating-2-btn" class="rating-card" type="button">
              <span class="rating-key">2</span>
              <span class="rating-title">可用但不完美</span>
              <span class="rating-desc">usable + partial + near_goal_stop</span>
            </button>
            <button id="rating-3-btn" class="rating-card" type="button">
              <span class="rating-key">3</span>
              <span class="rating-title">失败但有价值</span>
              <span class="rating-desc">usable + fail + operator_stop</span>
            </button>
            <button id="rating-4-btn" class="rating-card rating-discard" type="button">
              <span class="rating-key">4</span>
              <span class="rating-title">丢弃</span>
              <span class="rating-desc">discard</span>
            </button>
          </div>
        </section>

      </section>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
